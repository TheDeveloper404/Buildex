<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="#2563eb"/>
  
  <!-- Building silhouette -->
  <rect x="30" y="35" width="18" height="30" rx="2" fill="white"/>
  <rect x="52" y="45" width="16" height="20" rx="2" fill="white"/>
  
  <!-- Roof -->
  <polygon points="39,35 30,35 39,25" fill="white"/>
  
  <!-- Windows building 1 -->
  <rect x="33" y="38" width="5" height="5" rx="1" fill="#2563eb"/>
  <rect x="33" y="46" width="5" height="5" rx="1" fill="#2563eb"/>
  <rect x="33" y="54" width="5" height="5" rx="1" fill="#2563eb"/>
  <rect x="42" y="38" width="3" height="5" rx="1" fill="#2563eb"/>
  <rect x="42" y="46" width="3" height="5" rx="1" fill="#2563eb"/>
  
  <!-- Windows building 2 -->
  <rect x="55" y="50" width="4" height="4" rx="1" fill="#2563eb"/>
  <rect x="61" y="50" width="4" height="4" rx="1" fill="#2563eb"/>
  <rect x="55" y="57" width="4" height="4" rx="1" fill="#2563eb"/>
  
  <!-- Price chart line -->
  <polyline points="20,70 30,65 40,68 50,55 60,58 70,45 80,48" 
            fill="none" stroke="#10b981" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Chart dot -->
  <circle cx="80" cy="48" r="4" fill="#10b981"/>
</svg>
