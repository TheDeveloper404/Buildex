services:
  vitest:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      labels:
        app: buildex
        component: test-runner
        service: vitest
    image: buildex-test-vitest:latest
    container_name: buildex-test-vitest
    labels:
      app: buildex
      component: test-runner
      service: vitest
    volumes:
      - ./tests:/app/tests
      - buildex-test-vitest-results:/app/test-results
    working_dir: /app
    environment:
      NODE_ENV: test
    command: bash -c "npm run test:components -- --coverage"
    depends_on:
      - postgres-test
      - redis-test

  postgres-test:
    image: postgres:16-alpine
    container_name: buildex-test-postgres
    labels:
      app: buildex
      component: database
      service: test-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: buildex_test
    ports:
      - "5433:5432"
    volumes:
      - buildex-test-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-test:
    image: redis:7-alpine
    container_name: buildex-test-redis
    labels:
      app: buildex
      component: cache
      service: test-redis
    ports:
      - "6380:6379"
    volumes:
      - buildex-test-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  buildex-test-postgres-data:
    name: buildex-test-postgres-data
  buildex-test-redis-data:
    name: buildex-test-redis-data
  buildex-test-vitest-results:
    name: buildex-test-vitest-results
