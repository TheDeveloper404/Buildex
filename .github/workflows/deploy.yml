name: Build & Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}
  API_IMAGE: ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/buildex-api
  WEB_IMAGE: ${{ secrets.AZURE_REGISTRY_LOGIN_SERVER }}/buildex-web

jobs:
  # ── Build & push images ────────────────────────────────────────────────────
  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.API_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.API_IMAGE }}:latest
          cache-to: type=inline

      - name: Build & push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.WEB_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.WEB_IMAGE }}:latest
          cache-to: type=inline

  # ── Deploy to Azure Container Apps ────────────────────────────────────────
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy API container app
        uses: azure/container-apps-deploy-action@v1
        with:
          containerAppName: buildex-api
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          imageToDeploy: ${{ env.API_IMAGE }}:${{ needs.build.outputs.image-tag }}

      - name: Deploy Web container app
        uses: azure/container-apps-deploy-action@v1
        with:
          containerAppName: buildex-web
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          imageToDeploy: ${{ env.WEB_IMAGE }}:${{ needs.build.outputs.image-tag }}

      - name: Verify API health
        run: |
          echo "Waiting for deployment to stabilize..."
          sleep 20
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.API_URL }}/api/healthz)
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed: HTTP $STATUS"
            exit 1
          fi
          echo "API healthy (HTTP $STATUS)"
